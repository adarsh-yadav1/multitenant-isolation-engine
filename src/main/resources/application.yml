spring:
  application:
    name: multi-tenant-engine

  # ── Primary DataSource (Spring Boot / JPA / Flyway auto-config) ──────────────
  datasource:
    url: ${MASTER_DB_URL:jdbc:mysql://localhost:3306/saas_master?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${MASTER_DB_USER:master_user}
    password: ${MASTER_DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # ── JPA / Hibernate ──────────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    show-sql: false
    open-in-view: false

  # ── Redis ─────────────────────────────────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      lettuce:
        pool:
          max-active: 16
          max-idle: 8

  # ── Flyway ────────────────────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration/master
    url: ${MASTER_DB_URL:jdbc:mysql://localhost:3306/saas_master?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    user: ${MASTER_DB_USER:master_user}
    password: ${MASTER_DB_PASSWORD:}

# ── Master DataSource (used by TenantDataSourceConfig via @Value) ─────────────
datasource:
  master:
    url: ${MASTER_DB_URL:jdbc:mysql://localhost:3306/saas_master?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${MASTER_DB_USER:master_user}
    password: ${MASTER_DB_PASSWORD:}

# ── Tenant DataSources ────────────────────────────────────────────────────────
tenant:
  datasource:
    default-user: ${TENANT_DB_USER:tenant_user}
    default-password: ${TENANT_DB_PASSWORD:}
    pool-sizes:
      FREE: 2
      STARTER: 5
      PROFESSIONAL: 10
      ENTERPRISE: 20

# ── Rate Limiting Defaults ────────────────────────────────────────────────────
rate-limit:
  tiers:
    FREE:
      requests-per-minute: 60
      burst-capacity: 60
    STARTER:
      requests-per-minute: 200
      burst-capacity: 300
    PROFESSIONAL:
      requests-per-minute: 600
      burst-capacity: 900
    ENTERPRISE:
      requests-per-minute: 2000
      burst-capacity: 3000

# ── Security ──────────────────────────────────────────────────────────────────
app:
  security:
    jwt-secret: ${JWT_SECRET:dev-jwt-secret-change-in-production}
    admin-jwt-secret: ${ADMIN_JWT_SECRET:dev-admin-secret-change-in-production}
    jwt-expiration-ms: 86400000
  encryption:
    db-key: ${DB_ENCRYPTION_KEY:dev-encryption-key-change-in-production}

# ── Actuator ──────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] [tenant:%X{tenantId}] %-5level %logger{36} - %msg%n"
  level:
    root: INFO
    com.saas.multitenant: DEBUG
    org.hibernate.SQL: WARN

# ── Swagger ───────────────────────────────────────────────────────────────────
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs