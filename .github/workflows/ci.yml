name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:

  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      mysql-master:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: saas_master_test
          MYSQL_USER: test_user
          MYSQL_PASSWORD: test_pass
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 10

    env:
      MASTER_DB_URL: jdbc:mysql://localhost:3306/saas_master_test?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      MASTER_DB_USER: test_user
      MASTER_DB_PASSWORD: test_pass
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      JWT_SECRET: ${{ secrets.JWT_SECRET_TEST || 'ci-test-jwt-secret-must-be-32-chars-x' }}
      ADMIN_JWT_SECRET: ${{ secrets.ADMIN_JWT_SECRET_TEST || 'ci-admin-jwt-secret-must-be-32chars' }}
      DB_ENCRYPTION_KEY: ${{ secrets.DB_ENCRYPTION_KEY_TEST || 'ci-db-enc-key-must-be-32-chars-xxx' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build (skip tests)
        run: mvn package -DskipTests -q

      - name: Unit Tests
        run: mvn test

      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: target/surefire-reports/

  docker-build-check:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: multi-tenant-engine:ci-check
